<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Bronze border background -->
  <rect x="0" y="0" width="32" height="32" rx="5" ry="5" fill="#b87a30"/>
  <!-- Inner background -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="4" ry="4" fill="#0a1f12"/>
  <!-- 3x3 grid: G=neon green, W=white -->
  <!-- Row 1: G W G -->
  <rect x="4" y="4" width="7" height="7" rx="1" fill="#00e060"/>
  <rect x="12.5" y="4" width="7" height="7" rx="1" fill="#e8f8e8"/>
  <rect x="21" y="4" width="7" height="7" rx="1" fill="#00e060"/>
  <!-- Row 2: W G W -->
  <rect x="4" y="12.5" width="7" height="7" rx="1" fill="#e8f8e8"/>
  <rect x="12.5" y="12.5" width="7" height="7" rx="1" fill="#00e060"/>
  <rect x="21" y="12.5" width="7" height="7" rx="1" fill="#e8f8e8"/>
  <!-- Row 3: G W G -->
  <rect x="4" y="21" width="7" height="7" rx="1" fill="#00e060"/>
  <rect x="12.5" y="21" width="7" height="7" rx="1" fill="#e8f8e8"/>
  <rect x="21" y="21" width="7" height="7" rx="1" fill="#00e060"/>
</svg>
