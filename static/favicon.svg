<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <title>Organic Web Checker</title>
  <defs>

    <!-- Shadow blur only (applied to a shadow layer, not the icon itself) -->
    <filter id="shadowBlur" x="-60%" y="-60%" width="220%" height="240%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>

    <!-- Outer shell: lavender top-left → deep purple bottom-right -->
    <linearGradient id="outerShell" x1="18%" y1="0%" x2="82%" y2="100%">
      <stop offset="0%"   stop-color="#C4B5FD"/>
      <stop offset="38%"  stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#4C1D96"/>
    </linearGradient>

    <!-- Inner floor: soft lavender, lighter toward top-left -->
    <radialGradient id="innerFloor" cx="40%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#EDE9FE"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </radialGradient>

    <!-- Shell top-left gloss highlight -->
    <radialGradient id="shellGloss" cx="24%" cy="11%" r="56%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.52"/>
      <stop offset="48%"  stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Bottom rim glow (pink-purple, bleeds at base) -->
    <radialGradient id="btmGlow" cx="50%" cy="100%" r="55%">
      <stop offset="0%"   stop-color="#A78BFA" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>

    <!-- Green tile: light mint top → vivid green mid → deep green base -->
    <linearGradient id="gTile" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#A7F3C0"/>
      <stop offset="45%"  stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>

    <!-- White tile: pure white top → cool lavender-grey bottom -->
    <linearGradient id="wTile" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="55%"  stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#DDE4F5"/>
    </linearGradient>

    <!-- Tile gloss: bright top highlight fading to nothing -->
    <linearGradient id="tGloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.62"/>
      <stop offset="40%"  stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

  </defs>

  <!-- Drop shadow (blurred offset copy behind everything) -->
  <rect width="200" height="200" rx="44"
        fill="#4C1D96" opacity="0.24"
        transform="translate(0,10)"
        filter="url(#shadowBlur)"/>

  <!-- ── Outer shell body ─────────────────────────────────────────── -->
  <rect width="200" height="200" rx="44" fill="url(#outerShell)"/>

  <!-- Outer rim highlight (1px inner white ring — subtle gloss edge) -->
  <rect x="1.5" y="1.5" width="197" height="197" rx="43"
        fill="none" stroke="rgba(255,255,255,0.20)" stroke-width="2"/>

  <!-- ── Inner floor ──────────────────────────────────────────────── -->
  <!-- inset=22px each side → 156×156, rx=28 -->
  <rect x="22" y="22" width="156" height="156" rx="28" fill="url(#innerFloor)"/>

  <!-- Inner floor border highlight -->
  <rect x="22" y="22" width="156" height="156" rx="28"
        fill="none" stroke="rgba(255,255,255,0.38)" stroke-width="1.5"/>

  <!-- ── TILES ─────────────────────────────────────────────────────── -->
  <!--
    Layout: 44×44px tiles, 6px gaps (margins + between tiles)
    Positions: x/y = 28, 78, 128
    (22 + 6 = 28 first tile; 28+44+6 = 78; 78+44+6 = 128)
  -->

  <!-- Row 1: G  W  G -->
  <rect x="28"  y="28"  width="44" height="44" rx="9" fill="url(#gTile)"/>
  <rect x="28"  y="28"  width="44" height="44" rx="9" fill="url(#tGloss)"/>

  <rect x="78"  y="28"  width="44" height="44" rx="9" fill="url(#wTile)"/>
  <rect x="78"  y="28"  width="44" height="44" rx="9" fill="url(#tGloss)"/>

  <rect x="128" y="28"  width="44" height="44" rx="9" fill="url(#gTile)"/>
  <rect x="128" y="28"  width="44" height="44" rx="9" fill="url(#tGloss)"/>

  <!-- Row 2: W  G  W -->
  <rect x="28"  y="78"  width="44" height="44" rx="9" fill="url(#wTile)"/>
  <rect x="28"  y="78"  width="44" height="44" rx="9" fill="url(#tGloss)"/>

  <rect x="78"  y="78"  width="44" height="44" rx="9" fill="url(#gTile)"/>
  <rect x="78"  y="78"  width="44" height="44" rx="9" fill="url(#tGloss)"/>

  <rect x="128" y="78"  width="44" height="44" rx="9" fill="url(#wTile)"/>
  <rect x="128" y="78"  width="44" height="44" rx="9" fill="url(#tGloss)"/>

  <!-- Row 3: G  W  G -->
  <rect x="28"  y="128" width="44" height="44" rx="9" fill="url(#gTile)"/>
  <rect x="28"  y="128" width="44" height="44" rx="9" fill="url(#tGloss)"/>

  <rect x="78"  y="128" width="44" height="44" rx="9" fill="url(#wTile)"/>
  <rect x="78"  y="128" width="44" height="44" rx="9" fill="url(#tGloss)"/>

  <rect x="128" y="128" width="44" height="44" rx="9" fill="url(#gTile)"/>
  <rect x="128" y="128" width="44" height="44" rx="9" fill="url(#tGloss)"/>

  <!-- ── Shell overlays ───────────────────────────────────────────── -->
  <!-- Top-left gloss highlight (over everything including tiles) -->
  <rect width="200" height="200" rx="44" fill="url(#shellGloss)"/>

  <!-- Bottom rim glow overlay -->
  <rect width="200" height="200" rx="44" fill="url(#btmGlow)"/>

  <!-- Top inner-edge bright arc (the narrow highlight just inside the top shell edge) -->
  <ellipse cx="100" cy="22" rx="62" ry="9" fill="rgba(255,255,255,0.26)"/>

</svg>
