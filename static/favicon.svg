<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" width="90" height="90">
  <!-- Brown rounded-corner border -->
  <rect x="4" y="4" width="82" height="82" rx="16" ry="16"
        fill="white" stroke="#6b3a2a" stroke-width="3.5"/>
  <!-- 3x3 checkerboard, centered, 24px cells with 3px gap -->
  <!-- Row 1: G W G -->
  <rect x="11" y="11" width="22" height="22" rx="2" fill="#2d5a27"/>
  <rect x="34" y="11" width="22" height="22" rx="2" fill="white"/>
  <rect x="57" y="11" width="22" height="22" rx="2" fill="#2d5a27"/>
  <!-- Row 2: W G W -->
  <rect x="11" y="34" width="22" height="22" rx="2" fill="white"/>
  <rect x="34" y="34" width="22" height="22" rx="2" fill="#2d5a27"/>
  <rect x="57" y="34" width="22" height="22" rx="2" fill="white"/>
  <!-- Row 3: G W G -->
  <rect x="11" y="57" width="22" height="22" rx="2" fill="#2d5a27"/>
  <rect x="34" y="57" width="22" height="22" rx="2" fill="white"/>
  <rect x="57" y="57" width="22" height="22" rx="2" fill="#2d5a27"/>
</svg>
