<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90" width="90" height="90">
  <defs>
    <!-- Bronze metallic ring — highlight top-left, deep shadow bottom-right -->
    <linearGradient id="bronzeRing" x1="15%" y1="10%" x2="85%" y2="90%">
      <stop offset="0%"   stop-color="#e8b88a"/>
      <stop offset="28%"  stop-color="#8b4e22"/>
      <stop offset="62%"  stop-color="#b87040"/>
      <stop offset="100%" stop-color="#3a1a06"/>
    </linearGradient>
    <!-- Dark green background — radial, lighter top-left -->
    <radialGradient id="bgGreen" cx="36%" cy="32%" r="68%">
      <stop offset="0%"   stop-color="#3d7838"/>
      <stop offset="100%" stop-color="#142e12"/>
    </radialGradient>
    <!-- Metallic light-green cells -->
    <linearGradient id="grnCell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c4e8b0"/>
      <stop offset="40%"  stop-color="#62a855"/>
      <stop offset="100%" stop-color="#2a5426"/>
    </linearGradient>
    <!-- Metallic silver-sage cells -->
    <linearGradient id="whtCell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f2f9ef"/>
      <stop offset="45%"  stop-color="#c8dcc4"/>
      <stop offset="100%" stop-color="#8aaa86"/>
    </linearGradient>
    <!-- Clip checkerboard to inner rounded square -->
    <clipPath id="innerClip">
      <rect x="7" y="7" width="76" height="76" rx="12" ry="12"/>
    </clipPath>
  </defs>

  <!-- Outer bronze rounded-square ring -->
  <rect x="1" y="1" width="88" height="88" rx="18" ry="18" fill="url(#bronzeRing)"/>
  <!-- Thin dark inner edge of ring -->
  <rect x="6" y="6" width="78" height="78" rx="13" ry="13"
        fill="none" stroke="#28100400" stroke-width="1.2" opacity="0.5"/>
  <!-- Dark green background -->
  <rect x="7" y="7" width="76" height="76" rx="12" ry="12" fill="url(#bgGreen)"/>

  <!-- 3×3 checkerboard — 16px squares, 2px gaps, centered at 45,45 -->
  <!-- Columns: 19, 37, 55  |  Rows: 19, 37, 55  |  Extent: 19–71 -->
  <g clip-path="url(#innerClip)">
    <!-- Row 1: G  W  G -->
    <rect x="19" y="19" width="16" height="16" rx="1.5" fill="url(#grnCell)"/>
    <rect x="37" y="19" width="16" height="16" rx="1.5" fill="url(#whtCell)"/>
    <rect x="55" y="19" width="16" height="16" rx="1.5" fill="url(#grnCell)"/>
    <!-- Row 2: W  G  W -->
    <rect x="19" y="37" width="16" height="16" rx="1.5" fill="url(#whtCell)"/>
    <rect x="37" y="37" width="16" height="16" rx="1.5" fill="url(#grnCell)"/>
    <rect x="55" y="37" width="16" height="16" rx="1.5" fill="url(#whtCell)"/>
    <!-- Row 3: G  W  G -->
    <rect x="19" y="55" width="16" height="16" rx="1.5" fill="url(#grnCell)"/>
    <rect x="37" y="55" width="16" height="16" rx="1.5" fill="url(#whtCell)"/>
    <rect x="55" y="55" width="16" height="16" rx="1.5" fill="url(#grnCell)"/>
  </g>

  <!-- Subtle top-left sheen on inner face -->
  <rect x="7" y="7" width="76" height="76" rx="12" ry="12"
        fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="1"/>
</svg>
